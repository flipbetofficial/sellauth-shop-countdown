<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopSellAuth | Coming Soon</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:Inter,Arial,sans-serif;
    background:
    radial-gradient(circle at 20% 20%, rgba(88,101,242,.35), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(0,200,255,.15), transparent 25%),
    #05070f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}


/* Background particles */

body:before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:#5865F2;
    filter:blur(180px);
    opacity:.15;
}


/* Main card */

.container{

    position:relative;
    width:90%;
    max-width:900px;

    padding:60px 40px;

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:30px;

    text-align:center;

    box-shadow:
    0 0 80px rgba(88,101,242,.25);

    animation:show 1s ease;
}


@keyframes show{

from{
    opacity:0;
    transform:translateY(30px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}


/* Logo */

.logo{

font-size:50px;
font-weight:900;

background:
linear-gradient(
90deg,
#5865F2,
#00d4ff
);

-webkit-background-clip:text;
color:transparent;

margin-bottom:15px;

}


.badge{

display:inline-block;

padding:8px 18px;

border-radius:50px;

background:rgba(88,101,242,.15);

border:1px solid rgba(88,101,242,.4);

color:#b8c1ff;

font-size:14px;

margin-bottom:25px;

}


/* Text */

h1{

font-size:42px;

margin-bottom:15px;

}


.description{

color:#aeb7c9;

font-size:18px;

max-width:600px;

margin:auto;

line-height:1.6;

}


/* Countdown */

.countdown{

display:flex;

justify-content:center;

gap:18px;

margin:45px 0;

flex-wrap:wrap;

}


.box{

width:130px;

padding:25px 15px;

background:
rgba(255,255,255,.05);

border-radius:20px;

border:1px solid rgba(255,255,255,.1);

transition:.3s;

}


.box:hover{

transform:translateY(-8px);

border-color:#5865F2;

}


.number{

font-size:40px;

font-weight:800;

color:white;

}


.label{

margin-top:8px;

font-size:13px;

color:#8993aa;

text-transform:uppercase;

}


/* Button */


.button{

display:inline-flex;

gap:10px;

align-items:center;

padding:16px 35px;

border-radius:50px;

background:#5865F2;

color:white;

text-decoration:none;

font-weight:700;

transition:.3s;

}


.button:hover{

background:#4752c4;

transform:scale(1.05);

}


/* Footer */

.footer{

margin-top:35px;

color:#6f7890;

font-size:14px;

}


/* Mobile */

@media(max-width:600px){

.container{

padding:40px 20px;

}


h1{

font-size:30px;

}


.logo{

font-size:38px;

}


.box{

width:100px;

}

.number{

font-size:30px;

}

}

</style>

</head>


<body>


<div class="container">


<div class="badge">
🚀 Launching Soon
</div>


<div class="logo">
ShopSellAuth
</div>


<h1>
Premium Discord Products
</h1>


<p class="description">
A new generation of Discord tools, designs and services.
Our store is almost ready.
</p>



<div class="countdown">


<div class="box">
<div class="number" id="days">00</div>
<div class="label">Days</div>
</div>


<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Hours</div>
</div>


<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minutes</div>
</div>


<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Seconds</div>
</div>


</div>



<a class="button" href="#">
💬 Join Discord
</a>



<div class="footer">
© 2026 ShopSellAuth • All rights reserved
</div>


</div>



<script>


// Fixed launch date
// Change this date when needed

const launchDate = new Date();

launchDate.setDate(
launchDate.getDate()+15
);


function updateCountdown(){


const now = new Date();

const distance = launchDate - now;


if(distance <= 0){

document.querySelector(".countdown").innerHTML =
"🚀 WE ARE LIVE";

return;

}


const days =
Math.floor(
distance/(1000*60*60*24)
);


const hours =
Math.floor(
(distance/(1000*60*60))%24
);


const minutes =
Math.floor(
(distance/(1000*60))%60
);


const seconds =
Math.floor(
(distance/1000)%60
);



document.getElementById("days").textContent =
days.toString().padStart(2,"0");


document.getElementById("hours").textContent =
hours.toString().padStart(2,"0");


document.getElementById("minutes").textContent =
minutes.toString().padStart(2,"0");


document.getElementById("seconds").textContent =
seconds.toString().padStart(2,"0");


}


setInterval(updateCountdown,1000);

updateCountdown();


</script>


</body>
</html>
