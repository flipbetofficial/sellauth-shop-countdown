<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopSellAuth</title>

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body {
    height:100vh;
    background:
    radial-gradient(circle at top,#5865F2 0%,#111827 40%,#050505 100%);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.card {
    width:90%;
    max-width:700px;
    padding:50px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 50px rgba(88,101,242,.5);
}

.logo {
    font-size:45px;
    font-weight:900;
    color:#5865F2;
    margin-bottom:20px;
}

h1 {
    font-size:38px;
    margin-bottom:15px;
}

p {
    color:#cbd5e1;
    font-size:18px;
}

.countdown {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:35px 0;
    flex-wrap:wrap;
}

.box {
    background:#111827;
    padding:20px;
    border-radius:15px;
    min-width:110px;
    border:1px solid #5865F2;
}

.number {
    font-size:35px;
    font-weight:bold;
    color:#5865F2;
}

.label {
    color:#aaa;
}

button {
    background:#5865F2;
    border:none;
    color:white;
    padding:15px 35px;
    border-radius:50px;
    font-size:17px;
    cursor:pointer;
}

button:hover {
    background:#4752c4;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">ShopSellAuth</div>

<h1>Discord Theme Shop</h1>

<p>Launching soon. Premium Discord products coming.</p>

<div class="countdown">

<div class="box">
<div class="number" id="days">15</div>
<div class="label">Days</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Hours</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minutes</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Seconds</div>
</div>

</div>

<button>Join Discord</button>

</div>


<script>

let end = new Date();
end.setDate(end.getDate()+15);

function update(){

let now = new Date();
let diff = end-now;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor(diff/(1000*60*60)%24);
let minutes=Math.floor(diff/(1000*60)%60);
let seconds=Math.floor(diff/1000%60);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;

}

setInterval(update,1000);
update();

</script>

</body>
</html>
